        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      });

    function InquiryForm() {
      const [status, setStatus] = useState("idle"); // idle | sending | sent | error
      const [form, setForm] = useState({ name: "", email: "", phone: "", type: "Private Event", date: "", guests: "", message: "" });
      const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
      const mailtoFallback = `mailto:hello@monarchespresso.com?subject=${encodeURIComponent("Event/Catering Inquiry — " + form.type)}&body=${encodeURIComponent(`Name: ${form.name}\nEmail: ${form.email}\nPhone: ${form.phone}\nType: ${form.type}\nDate: ${form.date}\nGuests: ${form.guests}\n\n${form.message}`)}`;
      const submit = async (e) => {
        e.preventDefault();
        setStatus("sending");
        try {
          const res = await fetch("https://formsubmit.co/ajax/hello@monarchespresso.com", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({
              _subject: "New Event/Catering Inquiry — Monarch Website",
              _template: "table",
              _captcha: "false",
              Name: form.name, Email: form.email, Phone: form.phone,
              "Inquiry Type": form.type, "Preferred Date": form.date,
              "Guest Count": form.guests, Message: form.message
            })
          });
          if (!res.ok) throw new Error("send failed");
          setStatus("sent");
        } catch (err) {
          setStatus("error");
        }
      };
      const inputCls = "w-full bg-espresso border border-cream/15 rounded-xl px-4 py-3 text-sm text-cream placeholder-cream-dim/50 focus:outline-none focus:border-gold transition-colors";
      if (status === "sent") {
        return (
          <div className="bg-espresso-card border border-gold/50 rounded-2xl p-10 text-center">
            <div className="w-14 h-14 mx-auto rounded-full bg-gold/15 text-gold flex items-center justify-center mb-5"><Heart size={24} /></div>
            <h3 className="font-display text-2xl mb-3">Inquiry sent!</h3>
            <p className="text-cream-dim text-sm leading-relaxed">Thanks, {form.name || "friend"} — we'll follow up within 24 hours at {form.email || "your email"}.</p>
          </div>
        );
      }
      return (
        <form onSubmit={submit} className="bg-espresso-card border border-cream/10 rounded-2xl p-7 sm:p-9">
          <div className="grid sm:grid-cols-2 gap-4 mb-4">
            <div>
              <label htmlFor="inq-name" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Name *</label>
              <input id="inq-name" required value={form.name} onChange={set("name")} className={inputCls} placeholder="Your name" />
            </div>
            <div>
              <label htmlFor="inq-email" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Email *</label>
              <input id="inq-email" type="email" required value={form.email} onChange={set("email")} className={inputCls} placeholder="you@email.com" />
            </div>
            <div>
              <label htmlFor="inq-phone" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Phone</label>
              <input id="inq-phone" type="tel" value={form.phone} onChange={set("phone")} className={inputCls} placeholder="(205) 555-0100" />
            </div>
            <div>
              <label htmlFor="inq-type" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Inquiry type *</label>
              <select id="inq-type" value={form.type} onChange={set("type")} className={inputCls}>
                <option>Private Event</option>
                <option>Catering</option>
                <option>Brand Activation</option>
                <option>Tab for a Team</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label htmlFor="inq-date" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Preferred date</label>
              <input id="inq-date" type="date" value={form.date} onChange={set("date")} className={inputCls} />
            </div>
            <div>
              <label htmlFor="inq-guests" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Estimated guests</label>
              <input id="inq-guests" type="number" min="1" max="92" value={form.guests} onChange={set("guests")} className={inputCls} placeholder="e.g. 40 (max 92)" />
            </div>
          </div>
          <div className="mb-6">
            <label htmlFor="inq-msg" className="block text-xs tracking-widest uppercase text-cream-dim mb-2">Tell us about it *</label>
            <textarea id="inq-msg" required rows="4" value={form.message} onChange={set("message")} className={inputCls} placeholder="What do you have up your sleeve? Event details, catering needs, timing…"></textarea>
          </div>
          <div className="flex flex-wrap items-center gap-5">
            <button type="submit" disabled={status === "sending"} className="inline-flex items-center gap-2 bg-gold text-espresso font-bold tracking-wide text-sm px-8 py-3.5 rounded-full hover:bg-gold-light transition-colors disabled:opacity-60">
              {status === "sending" ? <Loader2 size={16} className="animate-spin" /> : <Mail size={16} />}
              {status === "sending" ? "SENDING…" : "SEND INQUIRY"}
            </button>
            <p className="text-xs text-cream-dim/70">We reply within 24 hours.</p>
          </div>
          {status === "error" && (
            <p className="mt-4 text-sm text-gold">Something went wrong sending your inquiry — <a href={mailtoFallback} className="underline">email us directly instead</a>.</p>
          )}
        </form>
      );
    }

          {/* photos */}

                <h3 className="font-display text-2xl mb-4">Brand Activations</h3>
                <p className="text-cream-dim text-sm leading-relaxed mb-6">We've partnered with brands including Shopbop, Kendra Scott, Bogg, WhatsApp and Target to connect our community with meaningful experiences. Looking to engage students and locals alike?</p>

                <p className="text-cream-dim leading-relaxed mb-7">From day one, you've made this endeavor the most rewarding adventure we've ever pursued. See you next time.</p>

    /* --------------------------------- gallery ----------------------------------- */
    function Gallery() {
      useReveal();
      const [lightbox, setLightbox] = useState(null);
      useEffect(() => {
        const fn = (e) => {
          if (lightbox === null) return;
          if (e.key === "Escape") setLightbox(null);
          if (e.key === "ArrowRight") setLightbox((lightbox + 1) % GALLERY.length);
          if (e.key === "ArrowLeft") setLightbox((lightbox - 1 + GALLERY.length) % GALLERY.length);
        };
        window.addEventListener("keydown", fn);
        return () => window.removeEventListener("keydown", fn);
      }, [lightbox]);
      return (
        <main className="pt-28 sm:pt-32">
          <div className="max-w-7xl mx-auto px-5 sm:px-8 pb-24">
            <div className="reveal max-w-2xl mb-12">
              <SectionTag>Gallery</SectionTag>
              <h1 className="font-display text-4xl sm:text-5xl md:text-6xl font-light leading-tight mb-6">Life at <span className="text-gold">Monarch.</span></h1>
              <p className="text-cream-dim leading-relaxed">A look inside the shop — latte art showdowns, market days, and the everyday moments in between. Follow along <a href={LINKS.instagram} target="_blank" rel="noopener noreferrer" className="text-gold hover:underline">@monarchespresso</a>.</p>
            </div>
            <div className="reveal columns-2 md:columns-3 lg:columns-4 gap-4 [&>div]:mb-4">
              {GALLERY.map((g, i) => (
                <div key={i} className="break-inside-avoid overflow-hidden rounded-xl cursor-zoom-in" onClick={() => setLightbox(i)}>
                  <img src={gimg(g)} alt={`Monarch Espresso Bar photo ${i + 1}`} className="w-full hover:scale-105 hover:opacity-90 transition-all duration-500" loading="lazy" />
                </div>
              ))}
            </div>
          </div>
          {lightbox !== null && (
            <div className="fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-4" onClick={() => setLightbox(null)}>
              <button aria-label="Close" className="absolute top-5 right-5 text-cream/80 hover:text-gold p-2"><X size={30} /></button>
              <button aria-label="Previous" className="absolute left-3 sm:left-8 text-cream/80 hover:text-gold p-2" onClick={(e) => { e.stopPropagation(); setLightbox((lightbox - 1 + GALLERY.length) % GALLERY.length); }}><ChevronLeft size={38} /></button>
              <img src={`${CDN}/${GALLERY[lightbox]}?format=2500w`} alt="Monarch Espresso Bar" className="max-h-[88vh] max-w-full rounded-lg object-contain" onClick={(e) => e.stopPropagation()} />
              <button aria-label="Next" className="absolute right-3 sm:right-8 text-cream/80 hover:text-gold p-2" onClick={(e) => { e.stopPropagation(); setLightbox((lightbox + 1) % GALLERY.length); }}><ChevronRight size={38} /></button>
            </div>
          )}
        </main>
      );
    }

    /* ----------------------------------- app ------------------------------------ */
    function App() {

        return () => window.removeEventListener("hashchange", fn);
      }, []);
      useEffect(() => { document.title = PAGE_TITLES[route] || PAGE_TITLES.home; }, [route]);
      const onNav = (id) => { setRoute(id); window.scrollTo({ top: 0 }); };
      const pages = {
        home: <Home onNav={onNav} />,
        order: <Order />,
        "coffee-club": <CoffeeClub />,
        events: <Events />,
        about: <About />,
        gallery: <Gallery />
      };
      return (
        <React.Fragment>
          <Header route={route} onNav={onNav} />
          {pages[route]}
          <Footer onNav={onNav} />
        </React.Fragment>
      );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
